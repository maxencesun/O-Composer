<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>O-Composer</title>
    <link rel="stylesheet" href="./styles.css">
    <script>
      (() => {
        const showStartupError = (message) => {
          if (!message || document.querySelector("[data-startup-error]")) {
            return;
          }
          const panel = document.createElement("pre");
          panel.dataset.startupError = "true";
          panel.textContent = `O-Composer failed to start:\n${message}`;
          panel.style.cssText = [
            "position:fixed",
            "inset:16px",
            "z-index:99999",
            "margin:0",
            "padding:16px",
            "overflow:auto",
            "white-space:pre-wrap",
            "font:13px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace",
            "color:#111",
            "background:#fff",
            "border:2px solid #b42318",
            "box-shadow:0 12px 30px rgba(0,0,0,.2)"
          ].join(";");
          document.body.append(panel);
        };
        window.addEventListener("error", (event) => {
          showStartupError(event.error?.stack || event.message);
        });
        window.addEventListener("unhandledrejection", (event) => {
          const reason = event.reason;
          showStartupError(reason?.stack || reason?.message || String(reason));
        });
      })();
    </script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <purple-pen-app></purple-pen-app>
  </body>
</html>
